id: dcr.public_client_with_secret
title: "Registration ignores a supplied client_secret for public clients"
version: "0.1"
spec_refs:
  - rfc7591
capabilities:
  required:
    - oauth.dcr
partner:
  type: mcp_auth_test_server
steps:
  - id: register_public_with_secret
    type: client_request
    action: oauth.dcr.register
    request:
      json:
        client_name: "confused client"
        redirect_uris:
          - "http://127.0.0.1:9876/callback"
        grant_types:
          - authorization_code
        token_endpoint_auth_method: "none"
        client_secret: "should-not-be-here"
    assert:
      - type: status
        expected: [200, 201]
