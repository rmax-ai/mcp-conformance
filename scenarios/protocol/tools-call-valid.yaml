id: protocol.tools_call_valid
title: "tools/call with valid tool name and params"
version: "0.1"
spec_refs:
  - mcp.tools
  - jsonrpc.2_0
capabilities:
  required:
    - mcp.tools
partner:
  type: generic_mcp_server
steps:
  - id: call_valid_tool
    type: client_request
    action: mcp.request
    request:
      method: tools/call
      params:
        name: "echo"
        arguments:
          message: "hello"
    assert:
      - type: jsonrpc_version
      - type: result_exists
