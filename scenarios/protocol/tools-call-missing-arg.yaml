id: protocol.tools_call_missing_arg
title: "tools/call with missing required argument returns error"
version: "0.1"
spec_refs:
  - mcp.tools
  - jsonrpc.2_0
capabilities:
  required:
    - mcp.tools
partner:
  type: generic_mcp_server
steps:
  - id: call_missing_arg
    type: client_request
    action: mcp.request
    request:
      method: tools/call
      params:
        name: "echo"
        arguments: {}
    assert:
      - type: jsonrpc_version
      - type: error_code
        expected: -32602
