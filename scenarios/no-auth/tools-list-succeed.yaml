id: no_auth.tools_list
title: "tools/list succeeds on a no-auth MCP server"
version: "0.1"
spec_refs:
  - mcp.tools
  - jsonrpc.2_0
capabilities:
  required:
    - mcp.no_auth
    - mcp.tools
partner:
  type: generic_mcp_server
steps:
  - id: list_tools
    type: client_request
    action: mcp.request
    request:
      method: tools/list
      params: {}
    assert:
      - type: jsonrpc_version
      - type: result_exists
      - type: result_shape
        expected:
          - tools
