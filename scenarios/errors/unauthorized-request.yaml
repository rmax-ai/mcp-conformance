id: errors.unauthorized_request_returns_401
title: "Unauthorized request returns 401 with bearer challenge"
version: "0.1"
spec_refs:
  - rfc6750
  - mcp.authorization
capabilities:
  required:
    - oauth.bearer
partner:
  type: mcp_auth_test_server
steps:
  - id: call_without_token
    type: client_request
    action: mcp.request
    request:
      method: tools/list
      params: {}
    assert:
      - type: status
        expected: 401
