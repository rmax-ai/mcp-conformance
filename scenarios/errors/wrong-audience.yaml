id: errors.wrong_audience
title: "Token with wrong audience returns 401"
version: "0.1"
spec_refs:
  - rfc6750
capabilities:
  required:
    - oauth.bearer
partner:
  type: mcp_auth_test_server
steps:
  - id: call_with_wrong_audience
    type: client_request
    action: mcp.request
    request:
      method: tools/list
      params: {}
    assert:
      - type: status
        expected: 401
