id: cimd.fetch_timeout
title: "CIMD fetch timeout handled gracefully"
version: "0.1"
spec_refs:
  - draft.cimd
  - mcp.authorization
capabilities:
  required:
    - oauth.cimd
partner:
  type: mcp_auth_test_server
steps:
  - id: configure_timeout
    type: inject_fault
    params:
      endpoint: "/test/cimd/slow.json"
      behavior: "delay"
      params:
        delay_seconds: 10
  - id: cimd_timeout
    type: client_request
    action: oauth.auth_code.authorize
    request:
      params:
        response_type: "code"
        client_id: "http://127.0.0.1:8765/test/cimd/slow.json"
        redirect_uri: "http://127.0.0.1:9876/callback"
        code_challenge: "E9Melhoa2OwvFrEMTJguCHaoeK1t8URWbuGJSstw-cM"
        code_challenge_method: "S256"
        state: "cimd999"
    assert:
      - type: status
        expected: [400]
  - id: reset_faults
    type: inject_fault
    params:
      behavior: "reset"
