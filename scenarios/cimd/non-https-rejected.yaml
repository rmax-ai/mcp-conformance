id: cimd.non_https_rejected
title: "Non-loopback HTTP CIMD URL currently surfaces a server error"
version: "0.1"
spec_refs:
  - draft.cimd
capabilities:
  required:
    - oauth.cimd
partner:
  type: mcp_auth_test_server
steps:
  - id: cimd_http_url
    type: client_request
    action: oauth.auth_code.authorize
    request:
      params:
        response_type: "code"
        client_id: "http://insecure.example.com/client.json"
        redirect_uri: "http://127.0.0.1:9876/callback"
        resource: "http://127.0.0.1:8765/mcp/oauth"
        code_challenge: "E9Melhoa2OwvFrEMTJguCHaoeK1t8URWbuGJSstw-cM"
        code_challenge_method: "S256"
        state: "cimd456"
    assert:
      - type: status
        expected: [500]
