id: auth.reused_authorization_code
title: "Reused authorization code fails on second exchange"
version: "0.1"
spec_refs:
  - rfc6749
  - rfc7636
capabilities:
  required:
    - oauth.auth_code_pkce
partner:
  type: mcp_auth_test_server
steps:
  - id: authorize
    type: client_request
    action: oauth.auth_code.authorize
    request:
      params:
        response_type: "code"
        client_id: "test-client"
        redirect_uri: "http://127.0.0.1:9876/callback"
        code_challenge: "E9Melhoa2OwvFrEMTJguCHaoeK1t8URWbuGJSstw-cM"
        code_challenge_method: "S256"
        state: "def456"
    assert:
      - type: status
        expected: [200, 302]
  - id: first_exchange
    type: client_request
    action: oauth.token.exchange
    request:
      json:
        grant_type: "authorization_code"
        code: "test-code"
        redirect_uri: "http://127.0.0.1:9876/callback"
        code_verifier: "valid-verifier"
        client_id: "test-client"
    assert:
      - type: response_contains_keys
        expected:
          - access_token
  - id: second_exchange
    type: client_request
    action: oauth.token.exchange
    request:
      json:
        grant_type: "authorization_code"
        code: "test-code"
        redirect_uri: "http://127.0.0.1:9876/callback"
        code_verifier: "valid-verifier"
        client_id: "test-client"
    assert:
      - type: status
        expected: 400
      - type: body_json_path
        path: "$.error"
        expected: "invalid_grant"
