id: auth.reused_authorization_code
title: "Reused authorization code fails on second exchange"
version: "0.1"
spec_refs:
  - rfc6749
  - rfc7636
capabilities:
  required:
    - oauth.auth_code_pkce
partner:
  type: mcp_auth_test_server
steps:
  - id: register
    type: client_request
    action: oauth.dcr.register
    request:
      json:
        client_name: "reused code client"
        redirect_uris:
          - "http://127.0.0.1:9876/callback"
        grant_types:
          - authorization_code
        response_types:
          - code
        token_endpoint_auth_method: "none"
    assert:
      - type: status
        expected: [200, 201]
  - id: authorize
    type: client_request
    action: oauth.auth_code.authorize
    request:
      params:
        response_type: "code"
        client_id:
          from_step: register
          path: "$.client_id"
        redirect_uri: "http://127.0.0.1:9876/callback"
        resource: "http://127.0.0.1:8765/mcp/oauth"
        code_challenge: "E9Melhoa2OwvFrEMTJguCHaoeK1t8URWbuGJSstw-cM"
        code_challenge_method: "S256"
        state: "def456"
        approval_mode: "auto_approve"
    assert:
      - type: status
        expected: [302]
  - id: first_exchange
    type: client_request
    action: oauth.token.exchange
    request:
      headers:
        content-type: "application/x-www-form-urlencoded"
      form:
        grant_type: "authorization_code"
        code:
          from_step: authorize
          header: "location"
          query_param: "code"
        redirect_uri: "http://127.0.0.1:9876/callback"
        code_verifier: "dBjftJeZ4CVP-mB92K27uhbUJU1p1r_wW1gFWFOEjXk"
        client_id:
          from_step: register
          path: "$.client_id"
        resource: "http://127.0.0.1:8765/mcp/oauth"
    assert:
      - type: status
        expected: 200
      - type: response_contains_keys
        expected:
          - access_token
  - id: second_exchange
    type: client_request
    action: oauth.token.exchange
    request:
      headers:
        content-type: "application/x-www-form-urlencoded"
      form:
        grant_type: "authorization_code"
        code:
          from_step: authorize
          header: "location"
          query_param: "code"
        redirect_uri: "http://127.0.0.1:9876/callback"
        code_verifier: "dBjftJeZ4CVP-mB92K27uhbUJU1p1r_wW1gFWFOEjXk"
        client_id:
          from_step: register
          path: "$.client_id"
        resource: "http://127.0.0.1:8765/mcp/oauth"
    assert:
      - type: status
        expected: 400
      - type: body_json_path
        path: "$.error"
        expected: "invalid_grant"
