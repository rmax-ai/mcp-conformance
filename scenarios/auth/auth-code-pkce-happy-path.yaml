id: auth.auth_code_pkce_happy_path
title: "Auth code + PKCE happy path"
version: "0.1"
spec_refs:
  - rfc6749
  - rfc7636
  - mcp.authorization
capabilities:
  required:
    - oauth.auth_code_pkce
partner:
  type: mcp_auth_test_server
steps:
  - id: discover
    type: client_request
    action: oauth.discover
    assert:
      - type: status
        expected: 200
  - id: register
    type: client_request
    action: oauth.dcr.register
    request:
      json:
        client_name: "mcp-conformance pkce test"
        redirect_uris:
          - "http://127.0.0.1:9876/callback"
        grant_types:
          - authorization_code
        response_types:
          - code
        token_endpoint_auth_method: "none"
    assert:
      - type: status
        expected: [200, 201]
      - type: response_contains_keys
        expected:
          - client_id
  - id: authorize
    type: client_request
    action: oauth.auth_code.authorize
    request:
      params:
        response_type: "code"
        client_id:
          from_step: register
          path: "$.client_id"
        redirect_uri: "http://127.0.0.1:9876/callback"
        resource: "http://127.0.0.1:8765/mcp/oauth"
        code_challenge: "E9Melhoa2OwvFrEMTJguCHaoeK1t8URWbuGJSstw-cM"
        code_challenge_method: "S256"
        state: "xyz789"
        approval_mode: "auto_approve"
    assert:
      - type: status
        expected: [302]
      - type: redirect_location_contains
        expected: "code="
  - id: exchange
    type: client_request
    action: oauth.token.exchange
    request:
      headers:
        content-type: "application/x-www-form-urlencoded"
      form:
        grant_type: "authorization_code"
        code:
          from_step: authorize
          header: "location"
          query_param: "code"
        redirect_uri: "http://127.0.0.1:9876/callback"
        code_verifier: "dBjftJeZ4CVP-mB92K27uhbUJU1p1r_wW1gFWFOEjXk"
        client_id:
          from_step: register
          path: "$.client_id"
        resource: "http://127.0.0.1:8765/mcp/oauth"
    assert:
      - type: status
        expected: 200
      - type: response_contains_keys
        expected:
          - access_token
          - token_type
  - id: list_tools
    type: client_request
    action: mcp.request
    auth:
      bearer_token:
        from_step: exchange
        path: "$.access_token"
    request:
      method: tools/list
      params: {}
    assert:
      - type: status
        expected: 200
      - type: jsonrpc_version
      - type: result_exists
