id: auth.missing_pkce_challenge
title: "Missing PKCE code_challenge"
version: "0.1"
spec_refs:
  - rfc7636
  - mcp.authorization
capabilities:
  required:
    - oauth.auth_code_pkce
partner:
  type: mcp_auth_test_server
steps:
  - id: authorize_no_pkce
    type: client_request
    action: oauth.auth_code.authorize
    request:
      json:
        response_type: "code"
        client_id: "test-client"
        redirect_uri: "http://127.0.0.1:9999/callback"
    assert:
      - type: status
        expected: [400, 302]
