id: auth.dcr_happy_path
title: "DCR happy path"
version: "0.1"
spec_refs:
  - rfc7591
  - mcp.authorization
capabilities:
  required:
    - oauth.dcr
    - oauth.auth_code_pkce
partner:
  type: mcp_auth_test_server
steps:
  - id: health
    type: client_request
    action: partner.health
    assert:
      - type: status
        expected: 200
  - id: register
    type: client_request
    action: oauth.dcr.register
    request:
      json:
        client_name: "mcp-conformance test client"
        redirect_uris:
          - "http://127.0.0.1:9876/callback"
        grant_types:
          - authorization_code
          - refresh_token
        response_types:
          - code
        token_endpoint_auth_method: "none"
    assert:
      - type: status
        expected: [200, 201]
      - type: response_contains_keys
        expected:
          - client_id
          - redirect_uris
          - grant_types
