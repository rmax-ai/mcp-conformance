id: auth.invalid_redirect_uri
title: "Authorization with invalid redirect URI"
version: "0.1"
spec_refs:
  - rfc6749
  - rfc7636
capabilities:
  required:
    - oauth.auth_code_pkce
partner:
  type: mcp_auth_test_server
steps:
  - id: register
    type: client_request
    action: oauth.dcr.register
    request:
      json:
        client_name: "invalid redirect client"
        redirect_uris:
          - "http://127.0.0.1:9876/callback"
        grant_types:
          - authorization_code
        response_types:
          - code
        token_endpoint_auth_method: "none"
    assert:
      - type: status
        expected: [200, 201]
  - id: authorize_bad_redirect
    type: client_request
    action: oauth.auth_code.authorize
    request:
      params:
        response_type: "code"
        client_id:
          from_step: register
          path: "$.client_id"
        redirect_uri: "https://evil.com/callback"
        resource: "http://127.0.0.1:8765/mcp/oauth"
        code_challenge: "E9Melhoa2OwvFrEMTJguCHaoeK1t8URWbuGJSstw-cM"
        code_challenge_method: "S256"
        state: "ghi789"
    assert:
      - type: status
        expected: [400]
