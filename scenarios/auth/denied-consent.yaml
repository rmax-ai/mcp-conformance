id: auth.denied_consent
title: "Denied consent returns access_denied"
version: "0.1"
spec_refs:
  - rfc6749
capabilities:
  required:
    - oauth.auth_code_pkce
partner:
  type: mcp_auth_test_server
steps:
  - id: register
    type: client_request
    action: oauth.dcr.register
    request:
      json:
        client_name: "denied consent client"
        redirect_uris:
          - "http://127.0.0.1:9876/callback"
        grant_types:
          - authorization_code
        response_types:
          - code
        token_endpoint_auth_method: "none"
    assert:
      - type: status
        expected: [200, 201]
  - id: authorize_deny
    type: client_request
    action: oauth.auth_code.authorize
    request:
      params:
        response_type: "code"
        client_id:
          from_step: register
          path: "$.client_id"
        redirect_uri: "http://127.0.0.1:9876/callback"
        resource: "http://127.0.0.1:8765/mcp/oauth"
        code_challenge: "E9Melhoa2OwvFrEMTJguCHaoeK1t8URWbuGJSstw-cM"
        code_challenge_method: "S256"
        state: "jkl012"
        approval_mode: "auto_deny"
    assert:
      - type: status
        expected: [302]
      - type: redirect_location_contains
        expected: "error=access_denied"
